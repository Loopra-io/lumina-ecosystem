name: Build and deploy Lumina apps to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all Lumina web apps
        run: |
          npm run build --workspace=apps/lumina-landing
          npm run build --workspace=apps/admin-hub
          npm run build --workspace=apps/faculty-portal
          npm run build --workspace=apps/lumina-connect

      - name: Prepare GitHub Pages artifact
        run: |
          rm -rf site
          mkdir -p site
          cp -R apps/lumina-landing/dist/* site/
          mkdir -p site/admin-hub
          cp -R apps/admin-hub/dist/* site/admin-hub/
          mkdir -p site/faculty-portal
          cp -R apps/faculty-portal/dist/* site/faculty-portal/
          mkdir -p site/lumina-connect
          cp -R apps/lumina-connect/dist/* site/lumina-connect/

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: site

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
