<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina | Redirigiendo...</title>
    <script>
      /**
       * GitHub Pages SPA fix.
       * Cuando GH Pages recibe una ruta como /Loopra/proyectos devuelve 404
       * porque no existe ese archivo. Este script redirige al index.html
       * codificando la ruta en el query string, y el index.html la restaura.
       *
       * Técnica: https://github.com/rafgraph/spa-github-pages
       */
      var pathSegmentsToKeep = 1; // 1 = mantiene /Loopra en la URL

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
